name: KeyRights

on:
  push:
  pull_request:

jobs:
  php:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: openssl
          coverage: none
      - run: composer validate
      - run: composer install --no-dev --no-interaction --prefer-dist
      - run: composer test
      - name: PHP syntax check
        shell: bash
        run: |
          set -euo pipefail
          find . -path './vendor' -prune -o -type f \( -name '*.php' -o -name '*.phtml' \) -print0 |
            xargs -0 -n1 php -l

  frontend:
    name: Frontend production bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: install/components/drdroid/keyrights
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: install/components/drdroid/keyrights/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm audit --omit=dev

  integration:
    name: Optional HTTP integration access checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.2'
          extensions: curl, openssl
          coverage: none
      - run: php tests/integration/http_access.php
        env:
          KEYRIGHTS_TEST_URL: ${{ secrets.KEYRIGHTS_TEST_URL }}
          KEYRIGHTS_TEST_COOKIE: ${{ secrets.KEYRIGHTS_TEST_COOKIE }}
          KEYRIGHTS_TEST_CSRF: ${{ secrets.KEYRIGHTS_TEST_CSRF }}
          KEYRIGHTS_TEST_ITEM_ID: ${{ secrets.KEYRIGHTS_TEST_ITEM_ID }}
          KEYRIGHTS_TEST_SECTION_ID: ${{ secrets.KEYRIGHTS_TEST_SECTION_ID }}
          KEYRIGHTS_TEST_REQUIRED: '0'
